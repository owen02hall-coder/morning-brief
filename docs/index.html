<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <meta name="theme-color" content="#0b1f3a" media="(prefers-color-scheme: light)" />
  <meta name="theme-color" content="#0e1116" media="(prefers-color-scheme: dark)" />
  <title>Morning Briefing</title>
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header>
    <p id="edition" class="edition"></p>
    <h1>Morning Briefing</h1>
    <div id="updated" class="updated"></div>
    <div id="listen" class="listen hidden">
      <button id="listen-btn" class="listen-btn" type="button" aria-label="Play the audio briefing"></button>
      <div class="listen-body">
        <span id="listen-label" class="listen-label">Listen to today's briefing</span>
        <div id="listen-track" class="listen-track hidden" aria-hidden="true"><div id="listen-fill" class="listen-fill"></div></div>
      </div>
      <span id="listen-time" class="listen-time hidden"></span>
      <audio id="listen-audio" preload="metadata"></audio>
    </div>
    <div id="stale" class="stale hidden"></div>
  </header>

  <main id="briefing">
    <p id="loading" class="muted" style="text-align:center; padding:2rem 0;">Loading today's briefing…</p>
  </main>

  <section id="archive-section">
    <h2>Past briefings</h2>
    <input id="archive-search" type="search" placeholder="Search past briefings…"
           aria-label="Search past briefings" autocomplete="off" />
    <ul id="archive-list"></ul>
    <div id="archive-view"></div>
  </section>

  <p id="ios-hint" class="hint hidden">
    Tip: on iPhone, tap Share then "Add to Home Screen" to install this.
  </p>

  <script src="app.js"></script>
</body>
</html>
