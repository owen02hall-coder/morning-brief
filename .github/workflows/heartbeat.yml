name: Briefing Heartbeat

# Independent of the build workflow on purpose: this catches a build that silently no-ops AND a
# scheduled build that GitHub dropped entirely. It checks the LIVE Pages page (what the phone loads).
on:
  schedule:
    - cron: "0 3 * * *"        # 03:00 UTC ~ 8-9pm America/Denver — well after the morning build window
  workflow_dispatch:

permissions:
  contents: read              # never commits — read-only

concurrency:
  group: heartbeat
  cancel-in-progress: false

jobs:
  check:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (SHA-pinned: mutable tags are a supply-chain vector in a push-capable job)

      # Same guard as briefing.yml: a missing NTFY_SUB would make this watchdog itself silent.
      - name: Fail fast if alerting is unwired
        run: '[ -n "${{ secrets.NTFY_SUB }}" ] || { echo "::error::NTFY_SUB secret missing — all alerting would be silent"; exit 1; }'

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (SHA-pinned)
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -c constraints.txt

      - name: Check live briefing freshness
        env:
          # Code reads env NTFY_TOPIC / PAGES_URL; the repo's secret/var are named NTFY_SUB / PAGE_URL.
          NTFY_TOPIC: ${{ secrets.NTFY_SUB }}
          PAGES_URL: ${{ vars.PAGE_URL }}
        run: python -m scripts.heartbeat

      - name: Failure backstop (ntfy-independent of the python push)
        # cancelled() included: a run killed by timeout-minutes is CANCELLED, not failed.
        if: failure() || cancelled()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_SUB }}
        run: |
          if [ -n "${NTFY_TOPIC}" ]; then
            curl -s -H "Title: Heartbeat FAILED" -H "Priority: high" \
              -d "The briefing heartbeat job failed or found a stale page. Check the GitHub Actions run." \
              "https://ntfy.sh/${NTFY_TOPIC}" || true
          fi
