name: Morning Briefing

on:
  schedule:
    # GitHub cron is UTC. 6am America/Denver = 12:00 UTC (MDT) or 13:00 UTC (MST).
    # Both fire (and GitHub may delay each by hours). The script de-dupes by date (state.last_run),
    # so whichever cron lands first that day builds and the rest no-op — delay is irrelevant.
    - cron: "0 12 * * *"
    - cron: "0 13 * * *"
  workflow_dispatch:
    inputs:
      force:
        description: "Run real work now regardless of the hour (for manual testing)"
        type: boolean
        default: true

permissions:
  contents: write          # required so GITHUB_TOKEN can push the daily commit

concurrency:
  group: briefing
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      # A missing/renamed NTFY_SUB secret would silently disable EVERY alarm path (ready push,
      # degraded pings, failure backstop). Fail loudly before doing any work.
      - name: Fail fast if alerting is unwired
        run: '[ -n "${{ secrets.NTFY_SUB }}" ] || { echo "::error::NTFY_SUB secret missing — all alerting would be silent"; exit 1; }'

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Build briefing
        env:
          # v1 uses Yahoo Finance chart API (keyless) + Gemini + ntfy. TWELVE_API_KEY is NOT needed until v2 breadth.
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Code reads env NTFY_TOPIC / PAGES_URL; the repo's secret/var are named NTFY_SUB / PAGE_URL.
          NTFY_TOPIC: ${{ secrets.NTFY_SUB }}
          PAGES_URL: ${{ vars.PAGE_URL }}
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.force }}" = "true" ]; then
            python -m scripts.build_briefing --force
          else
            python -m scripts.build_briefing
          fi

      # Non-fatal: a failed conversion ships the briefing without audio (client falls back to
      # the device voice). The manifest is written ONLY on success so the player can never bind
      # yesterday's mp3 to today's edition. tmp-then-mv keeps a half-written mp3 out of the commit.
      - name: Convert audio edition to mp3
        run: |
          if [ -f audio.wav ]; then
            if ffmpeg -y -loglevel error -i audio.wav -ac 1 -codec:a libmp3lame -b:a 48k /tmp/briefing-audio.mp3; then
              mv /tmp/briefing-audio.mp3 docs/briefing-audio.mp3
              python -c "import json; json.dump({'date': json.load(open('docs/briefing.json'))['date']}, open('docs/briefing-audio.json', 'w'))"
              echo "audio edition ready ($(du -h docs/briefing-audio.mp3 | cut -f1))"
            else
              echo "::warning::ffmpeg conversion failed — shipping without audio today"
            fi
          else
            echo "no audio.wav (TTS skipped or failed) — shipping without audio today"
          fi

      - name: Commit briefing + state
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/ state/
          git diff --staged --quiet || git commit -m "chore: daily briefing $(date -u +%F)"
          # Rebase-retry: a human push to main during the run must not fail the day's publish.
          git push || { git pull --rebase origin main && git push; } \
                   || { sleep 5 && git pull --rebase origin main && git push; }

      # Runs ONLY after the commit/push leg succeeded — the phone never hears "ready" for an
      # edition that is not on its way to Pages. No-ops (exit 0) when the build no-oped
      # (headline.txt absent). See scripts/notify.py main().
      - name: Send ready push (after publish)
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_SUB }}
          PAGES_URL: ${{ vars.PAGE_URL }}
        run: python -m scripts.notify ready

      - name: Health ping on failure (backstop)
        # cancelled() included: a run killed by timeout-minutes is CANCELLED, not failed —
        # without it a hung run alerts nobody until the heartbeat ~15h later.
        if: failure() || cancelled()
        env:
          NTFY_TOPIC: ${{ secrets.NTFY_SUB }}
        run: |
          if [ -n "${NTFY_TOPIC}" ]; then
            curl -s -H "Title: Briefing FAILED" -H "Priority: high" \
              -d "The morning briefing workflow failed. Check the GitHub Actions run." \
              "https://ntfy.sh/${NTFY_TOPIC}" || true
          fi
