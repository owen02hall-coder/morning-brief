name: Data Smoke

# Dispatch-only diagnostic: proves every data leg (Yahoo, RSS, TradingView breadth scan,
# Wikipedia constituents) works FROM A GITHUB RUNNER — CI egress IPs get blocked/limited in ways
# a home connection doesn't (the plan's load-bearing assumption gate for the unofficial
# TradingView endpoint). Writes nothing, notifies nobody.
on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  spine:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3 (SHA-pinned: mutable tags are a supply-chain vector in a push-capable job)

      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0 (SHA-pinned)
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt -c constraints.txt

      - name: Print the data spine (all four numbers + breadth + news counts)
        run: |
          python -m scripts.build_briefing --spine | tee spine.txt
          grep -q "breadth: {'sp500': {'value'" spine.txt || { echo "::error::S&P breadth did not compute from the runner"; exit 1; }
          grep -q "'ndx100': {'value'" spine.txt || { echo "::error::Nasdaq-100 breadth did not compute from the runner"; exit 1; }
